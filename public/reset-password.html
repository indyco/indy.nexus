<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — indy.nexus</title>
  <meta name="description" content="Set a new password for your indy.nexus account.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/tui.css">
</head>
<body>

<a href="#main-content" class="skip-nav">Skip to content</a>

<div class="shell">

  <!-- Title Bar -->
  <header class="titlebar" role="banner">
    <a href="/" class="titlebar__logo" style="text-decoration:none">indy<span>.</span>nexus</a>
    <nav class="titlebar__nav" role="navigation" aria-label="Primary navigation">
      <span class="titlebar__nav-item active" tabindex="0">Password Reset Required</span>
    </nav>
    <div class="titlebar__spacer"></div>
    <div class="titlebar__status">
      <div class="dot"></div>
      <span id="reset-username">Authenticated</span>
    </div>
    <button
      class="btn btn--ghost btn--sm"
      id="logout-btn"
      style="margin-left:0.5rem; height:1.75rem; padding:0 0.6rem; font-size:0.72rem;"
      aria-label="Logout"
    >
      ⏻ Logout
    </button>
  </header>

  <!-- Main Content -->
  <main class="main auth-wrap" id="main-content">
    <div class="auth-card" role="main" aria-label="Reset password form">

      <div class="auth-card__header">
        <span class="auth-card__icon" aria-hidden="true">🔐</span>
        <h1 class="auth-card__title">Set a New Password</h1>
      </div>

      <div class="auth-card__body">
        <div id="alert-area" role="alert" aria-live="polite"></div>

        <p class="text-sm text-muted" style="margin:0">
          You signed in with a temporary password. Set a new password to continue.
        </p>

        <form id="reset-form" novalidate autocomplete="on">
          <div class="flex-col gap-md">

            <div class="field">
              <label for="new-password">
                New Password <span class="req" aria-hidden="true">*</span>
              </label>
              <input
                type="password"
                id="new-password"
                name="newPassword"
                class="input"
                autocomplete="new-password"
                required
                aria-required="true"
                minlength="8"
                maxlength="128"
                placeholder="••••••••"
              >
              <span class="text-xs text-muted" style="margin-top:.2rem">8-128 characters.</span>
            </div>

            <div class="field">
              <label for="confirm-password">
                Confirm New Password <span class="req" aria-hidden="true">*</span>
              </label>
              <input
                type="password"
                id="confirm-password"
                name="confirmPassword"
                class="input"
                autocomplete="new-password"
                required
                aria-required="true"
                placeholder="••••••••"
                maxlength="128"
              >
            </div>

            <button type="submit" class="btn btn--primary btn--full" id="submit-btn">
              <span class="btn-text">✔ Save New Password</span>
            </button>

          </div>
        </form>
      </div>

      <div class="auth-card__footer">
        This temporary password will be invalid after your new password is saved.
      </div>

    </div>
  </main>

  <!-- Status Bar -->
  <footer class="statusbar" role="contentinfo">
    <div class="statusbar__section">
      <span class="tag blue">indy.nexus</span>
    </div>
    <span class="statusbar__sep">│</span>
    <div class="statusbar__section">Password Reset</div>
    <div class="statusbar__spacer"></div>
    <div class="statusbar__section">
      <span id="statusbar-clock" aria-live="off" aria-atomic="true"></span>
    </div>
  </footer>

</div><!-- .shell -->

<script src="/js/tui.js"></script>
<script>
  "use strict";

  let currentUser = null;
  const form = document.getElementById("reset-form");
  const submitBtn = document.getElementById("submit-btn");
  const alertArea = document.getElementById("alert-area");

  (async () => {
    currentUser = await requireAuth("/login.html");
    if (!currentUser) return;

    if (!currentUser.mustChangePassword) {
      window.location.href = currentUser.role === "admin" ? "/admin.html" : "/dashboard.html";
      return;
    }

    document.getElementById("reset-username").textContent = currentUser.username;
  })();

  document.getElementById("logout-btn").addEventListener("click", logout);

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearAlert(alertArea);

    const newPassword = form.newPassword.value;
    const confirmPassword = form.confirmPassword.value;

    if (!newPassword || !confirmPassword) {
      showAlert(alertArea, "Both password fields are required.", "error");
      return;
    }
    if (newPassword !== confirmPassword) {
      showAlert(alertArea, "Passwords do not match.", "error");
      return;
    }
    if (newPassword.length < 8) {
      showAlert(alertArea, "Password must be at least 8 characters.", "error");
      return;
    }
    if (newPassword.length > 128) {
      showAlert(alertArea, "Password must be 128 characters or fewer.", "error");
      return;
    }

    setButtonLoading(submitBtn, true);
    try {
      const data = await apiFetch("/api/account/reset-password", {
        method: "POST",
        body: { newPassword, confirmPassword },
      });
      showAlert(alertArea, data.message || "Password updated successfully.", "success");
      form.reset();
      setTimeout(() => {
        window.location.href = currentUser.role === "admin" ? "/admin.html" : "/dashboard.html";
      }, 500);
    } catch (err) {
      showAlert(alertArea, err.message, "error");
    } finally {
      setButtonLoading(submitBtn, false);
    }
  });

  registerGlobalShortcuts({
    Escape: () => logout(),
  });
</script>

</body>
</html>
